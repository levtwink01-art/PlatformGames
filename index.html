<!-- index.html на GitHub Pages -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя игра через VNC</title>
</head>
<body>
    <div id="vnc-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@novnc/novnc/core/websock.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@novnc/novnc/core/rfb.js"></script>
    <script>
        // Подключение к WebSocket-прокси, который запущен в GitHub Actions
        const rfb = new RFB(document.getElementById('vnc-container'), 
                           'ws://localhost:8080/vnc', 
                           { credentials: { password: 'password' } });
        rfb.connect();
    </script>
</body>
</html>
