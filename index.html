<!DOCTYPE html>
<html>
<head>
    <!-- Подключаем движок CheerpJ -->
    <script src="https://cdn.jsdelivr.net/gh/leaningtech/cheerpj-meta@3.0/cj3loader.js"></script>
</head>
<body>
    <!-- Ссылка, при нажатии на которую запускается твой .jar -->
    <a href="#" onclick="runGame();">Запустить игру</a>
    
    <script>
    async function runGame() {
        // 1. Инициализируем CheerpJ
        await cheerpjInit();
        
        // 2. Загружаем и запускаем твой JAR-файл с GitHub Pages
        // ВАЖНО: путь должен начинаться с /app/, за которым идёт имя файла
        await cheerpjRunMain("Game", "/app/GameWindow.jar");
    }
    </script>
</body>
</html>
    </div>
</body>
</html>
