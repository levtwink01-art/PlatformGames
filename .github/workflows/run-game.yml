name: Запуск игры через VNC в браузере

on:
  workflow_dispatch:

jobs:
  run-game:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Установить Xvfb, TigerVNC и noVNC
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb tigervnc-standalone-server tigervnc-common git
          git clone https://github.com/novnc/noVNC.git /tmp/noVNC
          git clone https://github.com/novnc/websockify.git /tmp/websockify

      - name: Настроить пароль для VNC
        run: |
          mkdir -p ~/.vnc
          echo "password" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Убить старые Xvfb и Xvnc
        run: |
          sudo pkill -f Xvfb || true
          sudo pkill -f Xvnc || true
          sudo rm -f /tmp/.X99-lock
          sudo rm -rf /tmp/.X11-unix/X99
          echo "Старые процессы и блокировки очищены"

      - name: Запустить виртуальный дисплей и VNC-сервер
        run: |
          # === ОЧИСТКА БЛОКИРОВКИ ===
          sudo rm -f /tmp/.X99-lock
          sudo rm -rf /tmp/.X11-unix/X99
          echo "Блокировка дисплея :99 очищена"

          # Запускаем Xvfb (виртуальный дисплей)
          Xvfb :99 -ac -screen 0 1024x768x24 &
          sleep 2
          
          # Запускаем VNC-сервер на порту 5900
          Xvnc :99 -rfbauth ~/.vnc/passwd -localhost -SecurityTypes VncAuth &
          sleep 2
          
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Запустить websockify (проброс VNC в WebSocket)
        run: |
          cd /tmp/websockify
          python3 websockify.py --web /tmp/noVNC 8080 localhost:5900 &
          sleep 2
          echo "VNC доступен по ws://localhost:8080/vnc"

      - name: Запустить игру
        run: |
          export NO_AT_BRIDGE=1
          java -cp GameWindow.jar Game &
          sleep 10

      - name: Показать логи и держать процесс
        run: |
          echo "✅ Всё запущено!"
          echo "🔗 Подключись через noVNC: http://localhost:8080/vnc.html"
          echo "⚠️ Страница работает только локально! Используй ngrok для публичного доступа."
          echo "⏳ Нажми Ctrl+C для остановки"
          wait
