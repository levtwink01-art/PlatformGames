name: Запуск игры

on:
  schedule:
    - cron: '0 */6 * * *'   # Каждые 6 часов
  workflow_dispatch:          # Ручной запуск через кнопку

jobs:
  run-game:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Запустить игру
        run: |
          echo "🎮 Игра запущена $(date)"
          java -jar GameWindow.jar
        timeout-minutes: 360   # Остановить через 6 часов
