name: Запуск игры через VNC + xTunnel

on:
  workflow_dispatch:

jobs:
  run-game:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Установить Xvfb, TigerVNC, wget, unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb tigervnc-standalone-server tigervnc-common wget unzip

      - name: Скачать noVNC и websockify (архивами)
        run: |
          # noVNC
          wget -q -O /tmp/noVNC.zip https://github.com/novnc/noVNC/archive/refs/heads/master.zip
          unzip -o /tmp/noVNC.zip -d /tmp
          mv /tmp/noVNC-master /tmp/noVNC

          # websockify
          wget -q -O /tmp/websockify.zip https://github.com/novnc/websockify/archive/refs/heads/master.zip
          unzip -o /tmp/websockify.zip -d /tmp
          mv /tmp/websockify-master /tmp/websockify

      - name: Настроить пароль для VNC
        run: |
          mkdir -p ~/.vnc
          echo "password" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Очистить блокировки и запустить Xvfb + Xvnc
        run: |
          sudo pkill -f Xvfb || true
          sudo pkill -f Xvnc || true
          sudo rm -f /tmp/.X99-lock
          sudo rm -rf /tmp/.X11-unix/X99

          Xvfb :99 -ac -screen 0 1024x768x24 &
          sleep 3

          Xvnc :99 -rfbauth ~/.vnc/passwd -localhost -SecurityTypes VncAuth &
          sleep 3

          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Запустить websockify
        run: |
          cd /tmp/websockify
          python3 websockify.py --web /tmp/noVNC 8080 localhost:5900 &
          sleep 3

      - name: Запустить игру
        run: |
          export NO_AT_BRIDGE=1
          java -cp GameWindow.jar Game &
          sleep 10

      - name: Установить xTunnel
        run: |
          wget -q -O /tmp/xtunnel.zip https://github.com/xtunnel/xtunnel/releases/latest/download/xtunnel-linux-amd64.zip
          unzip -o /tmp/xtunnel.zip -d /usr/local/bin
          chmod +x /usr/local/bin/xtunnel

      - name: Запустить xTunnel и показать ссылку
        run: |
          /usr/local/bin/xtunnel http 8080 > /tmp/xtunnel.log 2>&1 &
          sleep 10
          echo "🔥 ПУБЛИЧНАЯ ССЫЛКА НА VNC:"
          cat /tmp/xtunnel.log | grep -o 'https://[a-z0-9-]*\.tunnel4\.com' || echo "Не удалось найти ссылку"
          echo ""
          echo "🔗 Открой в браузере: ССЫЛКА/vnc.html"
          echo "🔑 Пароль VNC: password"

      - name: Держать процесс
        run: |
          echo "⏳ Нажми Ctrl+C для остановки"
          wait
